<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            margin-top: 10%;
            justify-items: center;
            justify-content: center;
            background-color: blanchedalmond;
        }
      
    </style>
     <script>
function calculateTotal() {
    // Get values from input fields
    const priceInput = document.getElementById('price');
    const quantityInput = document.getElementById('quantity');
    const totalSpan = document.getElementById('total');

    // Convert inputs to numbers
    // Use parseFloat to handle potential decimals in price
    const price = parseFloat(priceInput.value);
    const quantity = parseInt(quantityInput.value);

    // Validate inputs
    if (isNaN(price) || isNaN(quantity) || price < 0 || quantity < 1) {
        totalSpan.textContent = "Invalid Input";
        return;
    }

    // Calculate total
    const total = price * quantity;

    // Display the result, formatted to two decimal places
    totalSpan.textContent = total.toFixed(2);
}
</script>
</head>
<body>
     <div class="container">
        <h2 style="text-overflow: ellipsis;">Book Your Mapo Tofu</h2>
        <form>
            <div class="form-group">
                <label>Name:</label> <input type="text" required>
            </div>
            <div class="calculator-container">
       
        <label for="price">Base Price ($):</label>
        <input type="number" id="price" placeholder="Enter base price">

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" value="1" min="1">

        <button onclick="calculateTotal()">Calculate</button>

        <h2>Total Price: $<span id="total">0.00</span></h2>
    </div>
            
            
            <input type="submit" value="Place Order">
        </form>
    </div>
</body>
</html>
